name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write config.js
        env:
          MAPTILER_KEY: ${{ secrets.MAPTILER_KEY }}
        run: |
          node -e "const fs=require('fs'); fs.writeFileSync('config.js', 'window.APP_CONFIG = ' + JSON.stringify({ MAPTILER_KEY: process.env.MAPTILER_KEY }) + ';');"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
